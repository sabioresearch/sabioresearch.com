<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation — English</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .flag { font-size: 3rem; }
    h1 { font-size: 2rem; font-weight: 700; }
    p { color: #94a3b8; }
    .books {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 400px;
    }
    .book {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid #1e293b;
      border-radius: 10px;
      background: #1a1f2e;
      text-decoration: none;
      color: #e2e8f0;
      transition: border-color 0.15s, background 0.15s;
    }
    .book:hover { border-color: #3b82f6; background: #1e2840; }
    .book-icon { font-size: 1.5rem; }
    .book-title { font-size: 0.95rem; font-weight: 600; }
    .back { color: #3b82f6; text-decoration: none; font-size: 0.85rem; }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="flag">🇺🇸</div>
    <h1>English</h1>
    <p>Select a book to read</p>
  </div>
  <div class="books">
    <a class="book" href="../books/linear-algebra/en/">
      <span class="book-icon">📐</span>
      <span class="book-title">Linear Algebra for ML, CV, and Robotics</span>
    </a>
    <a class="book" href="../books/c-math-tour/en/">
      <span class="book-icon">🗼</span>
      <span class="book-title">A Tour of Computational Mathematical Research</span>
    </a>
  </div>
  <a class="back" href="../">← Language selection</a>
</body>
</html>
